name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build a fixture index (offline, mock embeddings)
        run: npm run seed:mock
      - name: Evals (retrieval recall gate)
        run: npm run evals
      - name: Build
        run: npm run build
